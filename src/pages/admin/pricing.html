<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Velura - Quản lý giá sản phẩm</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../styles/main.css">
  <link rel="stylesheet" href="../../styles/admin.css">
  <link rel="stylesheet" href="../../styles/price-management.css">
</head>
<body class="admin-page">
  <div class="admin-layout" data-admin-module="pricing">
    <aside class="admin-sidebar" id="admin-sidebar" aria-label="Điều hướng quản trị">
      <div class="admin-sidebar__brand"><a class="admin-sidebar__logo" href="./pricing.html"><img src="../../assets/images/logo.png" alt="Velura"></a><span class="admin-sidebar__caption">Quản trị</span></div>
      <nav class="admin-sidebar__nav">
        <a class="admin-menu-item" href="./dashboard.html"><svg class="admin-menu-icon"><use href="../../assets/icons/admin-icons.svg#dashboard"></use></svg>Dashboard</a>
        <a class="admin-menu-item" href="./accounts.html"><svg class="admin-menu-icon"><use href="../../assets/icons/admin-icons.svg#users"></use></svg>Quản lý tài khoản</a>
        <a class="admin-menu-item" href="./products.html"><svg class="admin-menu-icon"><use href="../../assets/icons/admin-icons.svg#box"></use></svg>Quản lý sản phẩm</a>
        <a class="admin-menu-item" href="./orders.html"><svg class="admin-menu-icon"><use href="../../assets/icons/admin-icons.svg#cart"></use></svg>Quản lý đơn hàng</a>
        <a class="admin-menu-item" href="./reviews.html"><svg class="admin-menu-icon"><use href="../../assets/icons/admin-icons.svg#star"></use></svg>Quản lý đánh giá</a>
        <a class="admin-menu-item" href="./returns-cskh.html"><svg class="admin-menu-icon"><use href="../../assets/icons/admin-icons.svg#support"></use></svg>Đổi trả &amp; CSKH</a>
        <details class="admin-menu-group" open><summary><svg class="admin-menu-icon"><use href="../../assets/icons/admin-icons.svg#tag"></use></svg>Giá &amp; khuyến mãi</summary><div class="admin-menu-subnav"><a class="is-active" href="./pricing.html">Quản lý giá</a><a href="./promotions.html">Quản lý khuyến mãi</a></div></details>
        <a class="admin-menu-item" href="./logs.html"><svg class="admin-menu-icon"><use href="../../assets/icons/admin-icons.svg#log"></use></svg>Nhật ký hệ thống</a>
      </nav>
    </aside>
    <div class="admin-main">
      <header class="admin-topbar">
        <div class="admin-topbar__leading"><button class="admin-icon-button admin-topbar__menu" type="button" data-pricing-sidebar aria-label="Đóng sidebar">☰</button><h1 class="admin-topbar__title">Quản lý giá sản phẩm</h1></div>
        <div class="admin-topbar__actions"><button class="admin-btn admin-btn--export admin-btn--sm" type="button" data-pricing-export>Xuất danh sách</button><button class="admin-btn admin-btn--secondary admin-btn--sm" type="button" data-pricing-open-logs>Xem lịch sử giá</button><button class="admin-profile" type="button"><span class="admin-profile__avatar">PH</span><span class="admin-profile__copy"><strong>Phạm Thu Hương</strong><small>Quản trị viên</small></span></button></div>
      </header>
      <main class="admin-content">
        <p class="admin-page-crumb">Dashboard / Giá &amp; khuyến mãi / Quản lý giá</p>
        <section class="admin-kpi-grid admin-pricing-kpis" aria-label="Thống kê giá" id="pricing-kpis"></section>
        <section class="admin-card admin-card--flush">
          <div class="admin-tab-content" id="pricing-panel"></div>
        </section>
      </main>
    </div>
  </div>
  <div id="pricing-overlay"></div>
  <p class="admin-toast" id="pricing-toast" hidden></p>
  <script type="module">
    import { checkAuth, updateSidebarForRole, logout } from '../../scripts/auth.js';
    const session = checkAuth();
    if (session) { updateSidebarForRole(session); document.addEventListener('click', e => { if (e.target.closest('[data-admin-logout]')) logout(); }); }
  </script>
  <script type="module" src="../../scripts/pricing.js"></script>
</body>
</html>
