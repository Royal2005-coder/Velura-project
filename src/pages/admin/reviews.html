<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Velura — Quản lý đánh giá</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../styles/main.css" />
  <link rel="stylesheet" href="../../styles/admin.css" />
</head>
<body class="admin-page">
  <div class="admin-layout" data-admin-module="reviews">
    <aside class="admin-sidebar" id="admin-sidebar" aria-label="Điều hướng quản trị">
      <div class="admin-sidebar__brand"><a class="admin-sidebar__logo" href="./reviews.html"><img src="../../assets/images/logo.png" alt="Velura" /></a><span class="admin-sidebar__caption">Quản trị</span></div>
      <nav class="admin-sidebar__nav">
        <a class="admin-menu-item" href="./dashboard.html"><svg class="admin-menu-icon"><use href="../../assets/icons/admin-icons.svg#dashboard" /></svg>Dashboard</a>
        <a class="admin-menu-item" href="./accounts.html"><svg class="admin-menu-icon"><use href="../../assets/icons/admin-icons.svg#users" /></svg>Quản lý tài khoản</a>
        <a class="admin-menu-item" href="./products.html"><svg class="admin-menu-icon"><use href="../../assets/icons/admin-icons.svg#box" /></svg>Quản lý sản phẩm</a>
        <a class="admin-menu-item" href="./orders.html"><svg class="admin-menu-icon"><use href="../../assets/icons/admin-icons.svg#cart" /></svg>Quản lý đơn hàng</a>
        <a class="admin-menu-item admin-menu-item--active" href="./reviews.html" aria-current="page"><svg class="admin-menu-icon"><use href="../../assets/icons/admin-icons.svg#star" /></svg>Quản lý đánh giá</a>
        <a class="admin-menu-item" href="./returns-cskh.html"><svg class="admin-menu-icon"><use href="../../assets/icons/admin-icons.svg#support" /></svg>Đổi trả &amp; CSKH</a>
        <details class="admin-menu-group"><summary><svg class="admin-menu-icon"><use href="../../assets/icons/admin-icons.svg#tag" /></svg>Giá &amp; khuyến mãi</summary><div class="admin-menu-subnav"><a href="./pricing.html">Quản lý giá</a><a href="./promotions.html">Quản lý khuyến mãi</a></div></details>
        <a class="admin-menu-item" href="./logs.html"><svg class="admin-menu-icon"><use href="../../assets/icons/admin-icons.svg#log" /></svg>Nhật ký hệ thống</a>
      </nav>
    </aside>
    <div class="admin-main">
      <header class="admin-topbar">
        <div class="admin-topbar__leading"><button class="admin-icon-button admin-topbar__menu" type="button" data-review-sidebar aria-label="Đóng sidebar">☰</button><h1 class="admin-topbar__title">Quản lý đánh giá</h1></div>
        <div class="admin-topbar__actions"><button class="admin-btn admin-btn--export admin-btn--sm" type="button" data-review-export>Xuất danh sách</button><button class="admin-btn admin-btn--secondary admin-btn--sm" type="button" data-review-open-logs>Xem nhật ký</button><button class="admin-profile" type="button"><span class="admin-profile__avatar">PH</span><span class="admin-profile__copy"><strong>Phạm Thu Hương</strong><small>Quản trị viên</small></span></button></div>
      </header>
      <main class="admin-content">
        <p class="admin-page-crumb">Dashboard / Quản lý đánh giá</p>
        <section class="admin-kpi-grid admin-review-kpis" aria-label="Thống kê đánh giá">
          <article class="admin-kpi-card"><div class="admin-kpi-card__head"><p class="admin-kpi-card__label">Tổng đánh giá</p><span class="admin-kpi-card__icon"><svg class="admin-line-icon"><use href="../../assets/icons/admin-icons.svg#star" /></svg></span></div><strong class="admin-kpi-card__value">126</strong></article>
          <article class="admin-kpi-card"><div class="admin-kpi-card__head"><p class="admin-kpi-card__label">Chờ duyệt</p><span class="admin-kpi-card__icon"><svg class="admin-line-icon"><use href="../../assets/icons/admin-icons.svg#clock" /></svg></span></div><strong class="admin-kpi-card__value">14</strong></article>
          <article class="admin-kpi-card"><div class="admin-kpi-card__head"><p class="admin-kpi-card__label">Cần xử lý gấp</p><span class="admin-kpi-card__icon"><svg class="admin-line-icon"><use href="../../assets/icons/admin-icons.svg#alert" /></svg></span></div><strong class="admin-kpi-card__value">6</strong></article>
          <article class="admin-kpi-card"><div class="admin-kpi-card__head"><p class="admin-kpi-card__label">Đã ẩn</p><span class="admin-kpi-card__icon"><svg class="admin-line-icon"><use href="../../assets/icons/admin-icons.svg#eye" /></svg></span></div><strong class="admin-kpi-card__value">8</strong></article>
          <article class="admin-kpi-card"><div class="admin-kpi-card__head"><p class="admin-kpi-card__label">Ticket CSKH</p><span class="admin-kpi-card__icon"><svg class="admin-line-icon"><use href="../../assets/icons/admin-icons.svg#support" /></svg></span></div><strong class="admin-kpi-card__value">3</strong></article>
        </section>
        <section class="admin-card admin-card--flush">
          <div class="admin-tabs" role="tablist"><button class="admin-tab admin-tab--active" type="button" data-review-tab="all">Tất cả đánh giá <span>126</span></button><button class="admin-tab" type="button" data-review-tab="pending">Chờ duyệt <span>14</span></button><button class="admin-tab" type="button" data-review-tab="urgent">Cần xử lý gấp <span>6</span></button><button class="admin-tab" type="button" data-review-tab="processed">Đã xử lý <span>24</span></button><button class="admin-tab" type="button" data-review-tab="logs">Nhật ký đánh giá</button></div>
          <div class="admin-tab-content" id="review-panel"></div>
        </section>
      </main>
    </div>
  </div>
  <div id="review-overlay"></div><p class="admin-toast" id="review-toast" hidden></p>
  <script type="module">
    import { checkAuth, updateSidebarForRole, logout } from '../../scripts/auth.js';
    const session = checkAuth();
    if (session) { updateSidebarForRole(session); document.addEventListener('click', e => { if (e.target.closest('[data-admin-logout]')) logout(); }); }
  </script>
  <script type="module" src="../../scripts/reviews.js"></script>
</body>
</html>
