<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Giỏ hàng của bạn - Velura Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Playfair+Display:wght@500;600&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="../../styles/main.css" />
</head>

<body class="page-cart">
  <div class="page-shell">
    <load src="/src/components/header.html" />

    <!-- Main Content -->
    <main class="cart-page">
      <div class="container">
        <!-- Breadcrumbs -->
        <load src="/src/components/breadcrumb.html" />

        <!-- Page Header -->
        <div class="cart-header">
          <h1 class="cart-title">Giỏ hàng của bạn</h1>
          <p class="cart-count">Bạn đang có 4 sản phẩm trong giỏ</p>
        </div>

        <!-- Cart Grid Layout -->
        <div class="cart-grid">
          <!-- Left Column: Items List -->
          <div class="cart-main">
            <div class="cart-select-all-wrapper" style="display: flex; align-items: center; gap: 10px; padding: 14px 18px; background: #FFF; border-radius: 8px; margin-bottom: 16px; border: 1px solid rgba(0,0,0,0.06);">
              <input type="checkbox" id="selectAllItems" class="cart-select-all-checkbox" style="width: 18px; height: 18px; cursor: pointer; accent-color: var(--terracotta);" checked />
              <label for="selectAllItems" style="font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 600; color: var(--dark); cursor: pointer; user-select: none;">Chọn tất cả</label>
            </div>

            <div class="cart-items">
              <!-- Cart items will be loaded dynamically by JavaScript -->
            </div>

            <!-- Guarantee Banner -->
            <div class="cart-guarantee">
              <svg class="cart-guarantee__icon" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="1.5">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                <path d="M9 11l2 2 4-4" />
              </svg>
              <p class="cart-guarantee__text">Yêu cầu đổi trả trong 48 giờ sau khi đơn được giao thành công; hoàn tiền trong 4 - 5 ngày làm việc sau khi hàng đạt kiểm tra.</p>
            </div>
          </div>

          <!-- Right Column: Summary Card -->
          <div class="cart-sidebar">
            <div class="summary-card">
              <h2 class="summary-card__title">Tóm tắt đơn hàng</h2>

              <div class="cart-summary-products" style="margin-top: 16px; margin-bottom: 16px; max-height: 300px; overflow-y: auto; padding-right: 4px; display: flex; flex-direction: column; gap: 12px;"></div>

              <hr class="summary-card__divider" />

              <!-- Price Breakdown -->
              <div class="summary-lines">
                <div class="summary-line">
                  <span class="summary-line__label">Tạm tính</span>
                  <span class="summary-line__value">9.050.000₫</span>
                </div>
              </div>

              <hr class="summary-card__divider" />

              <!-- Grand Total -->
              <div class="summary-total">
                <span class="summary-total__label">Tổng cộng</span>
                <span class="summary-total__value">9.050.000₫</span>
              </div>

              <!-- Checkout Button -->

              <button class="summary-card__btn-checkout js-btn-checkout" type="button"
                style="display: flex; align-items: center; justify-content: center; width: 100%; border: none; margin-top: 16px; padding: 14px; cursor: pointer;">
                Tiến hành thanh toán
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                  style="margin-left: 8px;">
                  <line x1="5" y1="12" x2="19" y2="12" />
                  <polyline points="12 5 19 12 12 19" />
                </svg>
              </button>

              <!-- Security Info -->
              <p class="summary-card__security">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                  style="vertical-align: middle; margin-right: 4px;">
                  <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                  <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                </svg>
                Thanh toán an toàn với SSL 256-bit
              </p>
            </div>
          </div>
        </div>
      </div>
    </main>

    <load src="/src/components/footer.html" />
  </div>

  <script type="module" src="../../scripts/main.js"></script>
</body>

</html>
