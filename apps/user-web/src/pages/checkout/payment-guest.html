<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Velura — Thanh toán (Chưa đăng nhập)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Playfair+Display:wght@500;600&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="../../styles/main.css" />
</head>

<body>
  <div class="page-shell">
    <load src="/src/components/header.html" />

    <main class="checkout-page">
      <div class="container">
        <load src="/src/components/breadcrumb.html" />
        <h1 class="page-title">Thanh toán</h1>

        <div class="checkout-steps">
          <div class="checkout-step"><span class="checkout-step__num checkout-step__num--active">1</span><span
              class="checkout-step__label checkout-step__label--active">Thông tin giao hàng</span></div>
          <span class="checkout-step__line"></span>
          <div class="checkout-step"><span class="checkout-step__num checkout-step__num--pending">2</span><span
              class="checkout-step__label checkout-step__label--pending">Vận chuyển &amp; Thanh toán</span></div>
          <span class="checkout-step__line"></span>
          <div class="checkout-step"><span class="checkout-step__num checkout-step__num--pending">3</span><span
              class="checkout-step__label checkout-step__label--pending">Xác nhận</span></div>
        </div>

        <div class="checkout-grid">
          <div class="checkout-main">
            <form class="card" data-prevent-submit>
              <div class="card__header">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                  <path d="M10.5 18.17c1.55-1.34 6.17-5.67 6.17-9.84a4.17 4.17 0 00-8.33 0c0 4.17 4.62 8.5 6.17 9.84z"
                    stroke="#7C5454" stroke-width="1.67" />
                </svg>
                <h2 class="section-title">Thông tin giao hàng</h2>
              </div>

              <div class="form-group">
                <label for="fullname">Họ và tên</label>
                <input class="form-input" type="text" id="fullname" placeholder="Nhập họ và tên" required />
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label for="guest-phone">Số điện thoại</label>
                  <input class="form-input" type="tel" id="guest-phone" placeholder="0901 234 567" required />
                </div>
                <div class="form-group">
                  <label for="guest-email">Email</label>
                  <input class="form-input" type="email" id="guest-email" placeholder="email@example.com" />
                </div>
              </div>
              <div class="form-group" id="guest-password-group"
                style="display: none; margin-top: 16px; margin-bottom: 16px;">
                <label for="guest-password"
                  style="color: var(--terracotta); font-weight: 600; display: block; margin-bottom: 6px;">Mật khẩu Thành
                  viên</label>
                <input class="form-input" type="password" id="guest-password"
                  placeholder="Nhập mật khẩu của bạn để đăng nhập"
                  style="border-color: var(--terracotta); width: 100%;" />
              </div>
              <div class="form-row form-row--three">
                <div class="form-group">
                  <label for="address-province">Tỉnh/Thành phố *</label>
                  <select class="form-input" id="address-province" required>
                    <option value="" disabled selected>Chọn Tỉnh/Thành phố</option>
                  </select>
                </div>
                <div class="form-group">
                  <label for="address-district">Quận/Huyện *</label>
                  <select class="form-input" id="address-district" required disabled>
                    <option value="" disabled selected>Chọn Quận/Huyện</option>
                  </select>
                </div>
                <div class="form-group">
                  <label for="address-ward">Phường/Xã *</label>
                  <select class="form-input" id="address-ward" required disabled>
                    <option value="" disabled selected>Chọn Phường/Xã</option>
                  </select>
                </div>
              </div>
              <div class="form-group">
                <label for="guest-address-detail">Địa chỉ cụ thể *</label>
                <input class="form-input" type="text" id="guest-address-detail" placeholder="Số nhà, tên đường"
                  required />
              </div>
              <div class="form-group">
                <label for="guest-note">Ghi chú (tùy chọn)</label>
                <textarea class="form-textarea" id="guest-note" placeholder="Ghi chú về đơn hàng..."></textarea>
              </div>
              <div class="checkout-actions">
                <button class="btn btn--primary" type="button" style="border: none; cursor: pointer; width: 100%;">Tiếp
                  tục</button>
              </div>
            </form>
          </div>

          <aside class="order-summary">
            <h2 class="order-summary__title">Tóm tắt đơn hàng</h2>
            <div class="checkout-product-list"
              style="max-height: 400px; overflow-y: auto; padding-right: 8px; margin-bottom: 24px;">
              <!-- JS will inject products here -->
            </div>
            <div class="summary-lines">
              <div class="summary-line"><span>Tạm tính</span><span class="summary-line__value">9.050.000₫</span></div>
            </div>
            <div class="summary-total">
              <span class="summary-total__label">Tổng cộng</span>
              <span class="summary-total__value">9.050.000₫</span>
            </div>
            <p class="summary-note">Thanh toán an toàn với SSL 256-bit</p>
          </aside>
        </div>
      </div>
    </main>



    <load src="/src/components/footer.html" />
  </div>
  <script type="module" src="../../scripts/main.js"></script>
</body>

</html>
