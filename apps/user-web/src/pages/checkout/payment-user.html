<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Velura — Thanh toán (Đã đăng nhập)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Playfair+Display:wght@500;600&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="../../styles/main.css" />
</head>

<body>
  <div class="page-shell">
    <load src="/src/components/header.html" />

    <main class="checkout-page">
      <div class="container">
        <load src="/src/components/breadcrumb.html" />

        <h1 class="page-title">Thanh toán</h1>

        <div class="checkout-steps" aria-label="Tiến trình thanh toán">
          <div class="checkout-step">
            <span class="checkout-step__num checkout-step__num--active">1</span>
            <span class="checkout-step__label checkout-step__label--active">Thông tin giao hàng</span>
          </div>
          <span class="checkout-step__line"></span>
          <div class="checkout-step">
            <span class="checkout-step__num checkout-step__num--pending">2</span>
            <span class="checkout-step__label checkout-step__label--pending">Vận chuyển &amp; Thanh toán</span>
          </div>
          <span class="checkout-step__line"></span>
          <div class="checkout-step">
            <span class="checkout-step__num checkout-step__num--pending">3</span>
            <span class="checkout-step__label checkout-step__label--pending">Xác nhận</span>
          </div>
        </div>

        <div class="checkout-grid">
          <div class="checkout-main">
            <section class="card">
              <div class="card__header">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
                  <path
                    d="M10.5 18.17c1.55-1.34 6.17-5.67 6.17-9.84a4.17 4.17 0 00-8.33 0c0 4.17 4.62 8.5 6.17 9.84zM10 10.83a2.5 2.5 0 100-5 2.5 2.5 0 000 5z"
                    stroke="#7C5454" stroke-width="1.67" />
                </svg>
                <h2 class="section-title">Thông tin giao hàng</h2>
              </div>

              <p class="label-upper" style="margin-bottom:16px">Chọn địa chỉ nhận hàng</p>
              <div class="address-list">
                <label class="address-card address-card--default is-selected">
                  <input type="radio" name="address" value="1" checked />
                  <div class="address-card__head">
                    <span class="address-card__name">NPNH</span>
                    <span class="address-card__badge">Mặc định</span>
                  </div>
                  <p class="address-card__phone">0901 234 567</p>
                  <p class="address-card__addr">123 Đường Lê Lợi, Phường Bến Thành, Quận 1, TP. Hồ Chí Minh</p>
                </label>
                <label class="address-card address-card--secondary">
                  <input type="radio" name="address" value="2" />
                  <div class="address-card__head">
                    <span class="address-card__name">NPNH</span>
                  </div>
                  <p class="address-card__phone">0901 234 567</p>
                  <p class="address-card__addr">456 Đường Nguyễn Huệ, Phường Bến Nghé, Quận 1, TP. Hồ Chí Minh</p>
                </label>
              </div>
              <button type="button" class="btn-add-address">+ Thêm địa chỉ mới</button>

              <div class="form-group" style="margin-top:24px">
                <label for="note">Ghi chú (tùy chọn)</label>
                <textarea class="form-textarea" id="note"
                  placeholder="Ghi chú về đơn hàng, ví dụ: thời gian hay chỉ dẫn địa điểm giao hàng chi tiết hơn"></textarea>
              </div>

              <div class="checkout-actions">
                <a class="btn btn--primary" href="./shipping-payment.html">Tiếp tục</a>
              </div>
            </section>
          </div>

          <aside class="order-summary">
            <h2 class="order-summary__title">Tóm tắt đơn hàng</h2>
            <div class="checkout-product-list" style="max-height: 400px; overflow-y: auto; padding-right: 8px; margin-bottom: 24px;">
              <!-- JS will inject products here -->
            </div>
            <div class="summary-lines">
              <div class="summary-line"><span>Tạm tính</span><span class="summary-line__value">9.050.000₫</span></div>
            </div>
            <div class="summary-total">
              <span class="summary-total__label">Tổng cộng</span>
              <span class="summary-total__value">9.050.000₫</span>
            </div>
            <p class="summary-note">Thanh toán an toàn với SSL 256-bit</p>
          </aside>
        </div>
      </div>
    </main>



    <!-- Modal Dialog -->
    <div class="modal" id="address-modal" aria-hidden="true">
      <div class="modal__backdrop"></div>
      <div class="modal__container">
        <div class="modal__content card">
          <div class="modal__header">
            <h3 class="modal__title" id="modal-title">Thêm địa chỉ mới</h3>
            <button class="modal__close js-btn-close-modal" type="button" aria-label="Đóng modal">×</button>
          </div>
          <form class="modal__form" id="address-form" novalidate>
            <input type="hidden" id="address-id" name="addressId" value="" />
            <div class="profile-form__row-grid">
              <div class="profile-form__group">
                <label for="address-fullname">Họ và tên</label>
                <div class="profile-form__input-wrapper">
                  <svg class="profile-form__field-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                    <circle cx="12" cy="7" r="4" />
                  </svg>
                  <input class="profile-form__input" type="text" id="address-fullname" name="fullname"
                    placeholder="Nhập họ và tên" required />
                </div>
              </div>
              <div class="profile-form__group">
                <label for="address-phone">Số điện thoại</label>
                <div class="profile-form__input-wrapper">
                  <svg class="profile-form__field-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2">
                    <path
                      d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" />
                  </svg>
                  <input class="profile-form__input" type="tel" id="address-phone" name="phone"
                    placeholder="Nhập số điện thoại" required />
                </div>
              </div>
            </div>

            <div class="profile-form__row-grid profile-form__row-grid--three">
              <div class="profile-form__group">
                <label>Tỉnh/Thành phố</label>
                <div class="profile-form__input-wrapper">
                  <div id="address-province-wrapper" data-field="province" data-placeholder="Chọn Tỉnh/Thành"></div>
                  <input type="hidden" id="address-province" name="province" required />
                </div>
              </div>
              <div class="profile-form__group">
                <label>Quận/Huyện</label>
                <div class="profile-form__input-wrapper">
                  <div id="address-district-wrapper" data-field="district" data-placeholder="Chọn Quận/Huyện"></div>
                  <input type="hidden" id="address-district" name="district" required />
                </div>
              </div>
              <div class="profile-form__group">
                <label>Phường/Xã</label>
                <div class="profile-form__input-wrapper">
                  <div id="address-ward-wrapper" data-field="ward" data-placeholder="Chọn Phường/Xã"></div>
                  <input type="hidden" id="address-ward" name="ward" required />
                </div>
              </div>
            </div>

            <div class="profile-form__group" style="margin-top: 24px;">
              <label for="address-detail">Địa chỉ chi tiết</label>
              <div class="profile-form__input-wrapper">
                <svg class="profile-form__field-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2">
                  <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                  <polyline points="9 22 9 12 15 12 15 22" />
                </svg>
                <input class="profile-form__input" type="text" id="address-detail" name="detail"
                  placeholder="Số nhà, tên đường, khu phố..." required />
              </div>
            </div>

            <div class="profile-form__group" style="margin-top: 20px;">
              <label class="checkbox-label" style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                <input class="checkbox-input" type="checkbox" id="address-is-default" name="isDefault" />
                <span class="checkbox-custom"></span>
                <span>Đặt làm địa chỉ mặc định</span>
              </label>
            </div>

            <div class="profile-form__actions" style="margin-top: 32px;">
              <button class="btn btn--primary" type="submit">Lưu địa chỉ</button>
              <button class="btn btn--outline js-btn-close-modal" type="button">Hủy</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <load src="/src/components/footer.html" />
  </div>
  <script type="module" src="../../scripts/main.js"></script>
</body>

</html>
