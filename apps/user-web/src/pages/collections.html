<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bộ sưu tập thời trang - Velura Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Playfair+Display:wght@500;600&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="../styles/main.css" />
</head>

<body class="page-collections">
  <div class="page-shell">
    <!-- Header -->
    <load src="/src/components/header.html" />

    <!-- Main Content -->
    <main class="collections-page">
      <div class="container">
        <!-- Breadcrumbs -->
        <load src="/src/components/breadcrumb.html" />

        <!-- Page Header -->
        <div class="collections-header">
          <span class="collections-badge">SEASON LOOKBOOKS</span>
          <h1 class="collections-title">BỘ SƯU TẬP VELURA</h1>
          <p class="collections-subtitle">Nơi lưu trữ những thiết kế may mặc cao cấp mang tinh thần tối giản, phóng
            khoáng và sang trọng của quý cô hiện đại.</p>
        </div>

        <!-- Filter Tabs -->
        <div class="collections-tabs">
          <button class="collections-tab active" data-filter="all">Đang tải...</button>
        </div>

        <!-- Collections List -->
        <div class="collections-list">
          <div style="text-align: center; color: var(--soft); padding: 64px 0;">Đang tải danh sách bộ sưu tập từ cửa hàng...</div>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <load src="/src/components/footer.html" />
  </div>

  <script type="module" src="../scripts/main.js"></script>
</body>

</html>
