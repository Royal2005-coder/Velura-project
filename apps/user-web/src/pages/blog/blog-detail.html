<body class="page-blog-detail">
  <div class="page-shell">
    <load src="/src/components/header.html" />

    <main class="blog-detail">
      <div class="container">
        <!-- Breadcrumb -->
        <nav class="breadcrumb" aria-label="Điều hướng">
          <a href="/src/pages/blog/blog.html" class="breadcrumb__link">Blog</a>
          <span class="breadcrumb__sep">/</span>
          <span class="breadcrumb__current" id="breadcrumbCategory">Xu hướng</span>
        </nav>

        <!-- Article Header -->
        <header class="article-header" id="articleHeader">
          <span class="blog-badge" id="articleBadge">Xu hướng</span>
          <h1 class="article-header__title" id="articleTitle">Loading...</h1>
          <div class="post-meta" id="articleMeta">
            <span class="post-meta__author" id="articleAuthor">-</span>
            <span class="post-meta__dot">&middot;</span>
            <span class="post-meta__date" id="articleDate">-</span>
            <span class="post-meta__dot">&middot;</span>
            <span class="post-meta__read-time">
              <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                <circle cx="8" cy="8" r="6" />
                <path d="M8 4v4l2.5 1.5" />
              </svg>
              <span id="articleReadTime">5 phút đọc</span>
            </span>
          </div>
        </header>

        <!-- Hero Image -->
        <figure class="article-hero" id="articleHero">
          <img src="" alt="" id="articleHeroImage" />
        </figure>

        <!-- Article Content -->
        <div class="article-layout">
          <article class="article-content" id="articleContent">
            <!-- Intro -->
            <p class="article-intro" id="articleIntro"></p>

            <!-- Takeaways -->
            <div class="article-takeaways" id="articleTakeaways">
              <h3 class="takeaways__title">Điểm chính</h3>
              <ul class="takeaways__list" id="takeawaysList"></ul>
            </div>

            <!-- Sections -->
            <div class="article-sections" id="articleSections"></div>
          </article>

          <!-- Sidebar: Product Recommendations -->
          <aside class="article-sidebar reveal" id="sidebarSection">
            <div class="sidebar-products">
              <h3 class="sidebar-products__title">Sản phẩm trong bài</h3>
              <div class="sidebar-products__list" id="sidebarProducts">
                <!-- Products will be injected here -->
              </div>
            </div>
          </aside>
        </div>

        <!-- Product Grid (Full Width) -->
        <section class="article-products-section reveal" id="productsSection">
          <h2 class="section-title">Sản phẩm đề xuất</h2>
          <div class="products-grid" id="productsGrid">
            <!-- Products will be injected here -->
          </div>
        </section>

        <!-- Related Posts -->
        <section class="related-posts reveal" id="relatedSection">
          <h2 class="section-title">Bài viết liên quan</h2>
          <div class="related-posts__grid" id="relatedPosts">
            <!-- Related posts will be injected here -->
          </div>
        </section>
      </div>
    </main>

    <load src="/src/components/footer.html" />
  </div>

    function productDetailUrl(sku) {
      const id = PRODUCT_IDS[sku];
      return id ? `/src/pages/products/detail.html?id=${id}` : "/src/pages/products/list.html";
    }

    // Format price
    function formatPrice(price) {
      return new Intl.NumberFormat('vi-VN').format(price) + 'đ';
    }

    // Get URL params
    const params = new URLSearchParams(window.location.search);
    const slug = params.get('slug');

    // Get blog post (fall back to the latest post if slug missing/invalid)
    let post = getFallbackBlogPost(slug);
    if (!post && FALLBACK_BLOG_POSTS.length) {
      post = FALLBACK_BLOG_POSTS[0];
      try {
        const normalized = `/src/pages/blog/blog-detail.html?slug=${encodeURIComponent(post.slug)}`;
        window.history.replaceState({}, '', normalized);
      } catch (e) {
        /* ignore (e.g. file:// context) */
      }
    }

    if (post) {
      // Get category name
      const category = FALLBACK_BLOG_CATEGORIES.find(c => c.slug === post.category_slug);

      // Update page
      document.title = `${post.title} - Velura Journal`;
      document.getElementById('breadcrumbCategory').textContent = category?.name || post.category_slug;
      document.getElementById('articleBadge').textContent = category?.name || post.category_slug;
      document.getElementById('articleTitle').textContent = post.title;
      document.getElementById('articleAuthor').textContent = post.author;
      document.getElementById('articleDate').textContent = new Date(post.published_at).toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit', year: 'numeric' });
      document.getElementById('articleReadTime').textContent = `${post.read_minutes} phút đọc`;
      const heroImg = document.getElementById('articleHeroImage');
      heroImg.src = post.image_url;
      heroImg.alt = post.title;
      heroImg.onerror = () => { heroImg.src = '/src/assets/images/image-8.png'; };
      document.getElementById('articleIntro').textContent = post.content.intro;

      // Render takeaways
      const takeawaysList = document.getElementById('takeawaysList');
      post.content.takeaways.forEach(takeaway => {
        const li = document.createElement('li');
        li.className = 'takeaway-item';
        li.textContent = takeaway;
        takeawaysList.appendChild(li);
      });

      // Render sections
      const sectionsContainer = document.getElementById('articleSections');
      post.content.sections.forEach(section => {
        const sectionEl = document.createElement('div');
        sectionEl.className = 'article-section reveal';

        const heading = document.createElement('h2');
        heading.className = 'article-section__heading';
        heading.textContent = section.heading;
        sectionEl.appendChild(heading);

        section.body.forEach(paragraph => {
          const p = document.createElement('p');
          p.className = 'article-section__body';
          p.textContent = paragraph;
          sectionEl.appendChild(p);
        });

        sectionsContainer.appendChild(sectionEl);
      });

      // Render sidebar products
      const sidebarContainer = document.getElementById('sidebarProducts');
      post.content.products.forEach(item => {
        const product = PRODUCTS[item.sku];
        if (product) {
          const card = createSidebarProductCard(product, item.note, item.sku);
          sidebarContainer.appendChild(card);
        }
      });

      // Render products grid
      const gridContainer = document.getElementById('productsGrid');
      const allSkus = [...new Set(post.content.sections.flatMap(s => s.productSkus || []))];
      allSkus.forEach(sku => {
        const product = PRODUCTS[sku];
        if (product) {
          const card = createProductGridCard(product, sku);
          gridContainer.appendChild(card);
        }
      });

       // Render related posts (same category first, then fill with others)
      const relatedContainer = document.getElementById('relatedPosts');
      const sameCategory = FALLBACK_BLOG_POSTS
        .filter(p => p.slug !== post.slug && p.category_slug === post.category_slug);
      const otherPosts = FALLBACK_BLOG_POSTS
        .filter(p => p.slug !== post.slug && p.category_slug !== post.category_slug);
      const relatedPosts = [...sameCategory, ...otherPosts].slice(0, 3);

      if (relatedPosts.length) {
        relatedPosts.forEach(related => {
          const card = createRelatedPostCard(related);
          relatedContainer.appendChild(card);
        });
      } else {
        const section = relatedContainer.closest('.related-posts');
        if (section) section.hidden = true;
      }
    } else {
      // No matching post (e.g. opened without ?slug=) — show a clean not-found state
      const titleEl = document.getElementById('articleTitle');
      if (titleEl) titleEl.textContent = 'Không tìm thấy bài viết';
      const content = document.getElementById('articleContent');
      if (content) {
        content.innerHTML = '<p class="article-intro">Bài viết bạn đang tìm không tồn tại hoặc đã bị xóa.' +
          ' <a href="/src/pages/blog/blog.html" style="color:var(--terracotta,#c97b63);font-weight:600;">Quay lại trang Blog</a>.</p>';
      }
      ['articleHero', 'sidebarSection', 'productsSection', 'relatedSection'].forEach((id) => {
        const el = document.getElementById(id);
        if (el) el.hidden = true;
      });
    }

    // Create product card (inline)
    function createProductCard(product, sku) {
      const card = document.createElement('article');
      card.className = 'product-card-inline';
      card.innerHTML = `
        <a href="${productDetailUrl(sku)}" class="product-card-inline__link">
          <div class="product-card-inline__image">
            <img src="${product.image}" alt="${product.name}" loading="lazy" onerror="this.src='/src/assets/images/placeholder.jpg'" />
          </div>
        </a>
        <div class="product-card-inline__info">
          <span class="product-card-inline__color">${product.color || 'Mặc định'}</span>
          <h4 class="product-card-inline__name">
            <a href="${productDetailUrl(sku)}">${product.name}</a>
          </h4>
          <span class="product-card-inline__price">${formatPrice(product.price)}</span>
        </div>
        <div class="product-card-inline__actions">
          <button class="product-card-inline__buy js-buy-now-blog" data-sku="${sku}" type="button">Mua ngay</button>
          <button class="product-card-inline__cart js-add-cart-blog" data-sku="${sku}" type="button">Thêm vào giỏ</button>
        </div>
      `;
      return card;
    }

    // Create sidebar product card
    function createSidebarProductCard(product, note, sku) {
      const card = document.createElement('div');
      card.className = 'sidebar-product';
      card.innerHTML = `
        <a href="${productDetailUrl(sku)}" class="sidebar-product__link">
          <div class="sidebar-product__image">
            <img src="${product.image}" alt="${product.name}" loading="lazy" onerror="this.src='/src/assets/images/placeholder.jpg'" />
          </div>
          <div class="sidebar-product__info">
            <h4 class="sidebar-product__name">${product.name}</h4>
            <p class="sidebar-product__note">${note}</p>
            <span class="sidebar-product__price">${formatPrice(product.price)}</span>
          </div>
        </a>
        <button class="sidebar-product__cart js-add-cart-blog" data-sku="${sku}" type="button">Thêm vào giỏ</button>
      `;
      return card;
    }

    // Create product grid card
    function createProductGridCard(product, sku) {
      const card = document.createElement('article');
      card.className = 'product-card';
      card.innerHTML = `

          <div class="product-card__image">

          </div>
        </a>

          <span class="product-card__color">${product.color || 'Mặc định'}</span>
          <h4 class="product-card__name">${product.name}</h4>
          <span class="product-card__price">${formatPrice(product.price)}</span>
        </div>
        <div class="product-card__actions">
          <button class="product-card__buy js-buy-now-blog" data-sku="${sku}" type="button">Mua ngay</button>
          <button class="product-card__cart js-add-cart-blog" data-sku="${sku}" type="button">Thêm vào giỏ</button>
        </div>
      `;
      return card;
    }

    // Create related post card
    function createRelatedPostCard(post) {
      const category = FALLBACK_BLOG_CATEGORIES.find(c => c.slug === post.category_slug);
      const card = document.createElement('a');
      card.className = "article-card";
      card.href = `/src/pages/blog/blog-detail.html?slug=${post.slug}`;
      card.dataset.category = post.category_slug;
      card.innerHTML = `
        <div class="article-card__image">
          <img src="${post.image_url}" alt="${post.title}" loading="lazy" onerror="this.src='/src/assets/images/placeholder.jpg'" />
        </div>
        <div class="article-card__content">
          <span class="blog-badge">${category?.name || post.category_slug}</span>
          <h3 class="article-card__title">${post.title}</h3>
          <p class="article-card__excerpt">${post.excerpt}</p>
          <div class="post-meta">
            <span class="post-meta__author">${post.author}</span>
            <span class="post-meta__dot">&middot;</span>
            <span class="post-meta__date">${new Date(post.published_at).toLocaleDateString('vi-VN', { day: '2-digit', month: '2-digit', year: 'numeric' })}</span>
            <span class="post-meta__dot">&middot;</span>
            <span class="post-meta__read-time">
              <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
                <circle cx="8" cy="8" r="6" />
                <path d="M8 4v4l2.5 1.5" />
              </svg>
              ${post.read_minutes} phút
            </span>
          </div>
        </div>
      `;
      return card;
    }

    // Wire add-to-cart buttons to the system cart module
    function bindBlogCartButtons() {
      const buttons = document.querySelectorAll('.js-add-cart-blog');
      buttons.forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.preventDefault();
          const sku = btn.getAttribute('data-sku');
          const product = PRODUCTS[sku];
          const productId = PRODUCT_IDS[sku];
          if (!product || !productId) return;

          addToCart({
            variant_id: `var-${productId}`,
            product_id: productId,
            product_name: product.name,
            product_image: product.image,
            quantity: 1,
            unit_price: product.price,
            color: product.color || 'Mặc định',
            size: 'M'
          });
          updateBadge();

          const original = btn.innerHTML;
          btn.innerHTML = 'Đã thêm ✓';
          btn.classList.add('is-added');
          setTimeout(() => {
            btn.innerHTML = original;
            btn.classList.remove('is-added');
          }, 1500);
        });
      });
    }

    // Reveal-on-scroll for detail page sections (Motion 4, respects reduced-motion)
    function setupDetailReveal() {
      const targets = document.querySelectorAll('.reveal:not(.is-visible)');
      if (!targets.length) return;
      if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
        targets.forEach((el) => el.classList.add('is-visible'));
        return;
      }
      const io = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            entry.target.classList.add('is-visible');
            io.unobserve(entry.target);
          }
        });
      }, { threshold: 0.1 });
      targets.forEach((el, index) => {
        el.style.transitionDelay = `${Math.min(index, 5) * 70}ms`;
        io.observe(el);
      });
    }

    // Wire "Mua ngay" (Buy Now) buttons: add to cart, then go to checkout
    function bindBlogBuyNow() {
      const buttons = document.querySelectorAll('.js-buy-now-blog');
      buttons.forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.preventDefault();
          const sku = btn.getAttribute('data-sku');
          const product = PRODUCTS[sku];
          const productId = PRODUCT_IDS[sku];
          if (!product || !productId) {
            showToast('Sản phẩm này hiện không khả dụng!');
            return;
          }

          addToCart({
            variant_id: `var-${productId}`,
            product_id: productId,
            product_name: product.name,
            product_image: product.image,
            quantity: 1,
            unit_price: product.price,
            color: product.color || 'Mặc định',
            size: 'M'
          });
          updateBadge();

          const original = btn.innerHTML;
          btn.innerHTML = 'Đang chuyển…';
          btn.disabled = true;
          window.location.href = '/src/pages/checkout/shipping-payment.html';
          setTimeout(() => {
            btn.innerHTML = original;
            btn.disabled = false;
          }, 1200);
        });
      });
    }

    // Bind after all cards are rendered
    bindBlogCartButtons();
    bindBlogBuyNow();
    setupDetailReveal();
  </script>
</body>
