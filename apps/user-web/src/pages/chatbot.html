<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Stylist Chatbot — Velura</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/styles/main.css" />
</head>
<body class="page-chatbot">
  <div class="page-shell">
    <load src="/src/components/header.html" />
    <main>
      <div class="chatbot-page">
        <aside class="chatbot-page__sidebar js-chatbot-sidebar">
          <div class="chatbot-sidebar-header">
            <h3 class="chatbot-sidebar-title">Lịch sử trò chuyện</h3>
            <button class="chatbot-sidebar-close js-close-sidebar" type="button" aria-label="Thu gọn sidebar">✕</button>
          </div>
          <button class="chatbot-new-chat-btn js-new-chat" type="button">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Cuộc trò chuyện mới
          </button>
          <div class="chatbot-sessions js-chatbot-sessions"></div>
        </aside>
        <div class="chatbot-page__main">
          <div class="chatbot-box chatbot-box--page">
            <div class="chatbot-header">
              <div class="chatbot-header__info">
                <div class="chatbot-header__avatar">
                  <svg class="bot-sparkle-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#734724" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
                  </svg>
                  <span class="chatbot-header__status"></span>
                </div>
                <div>
                  <h4 class="chatbot-header__title">AI Stylist</h4>
                  <span class="chatbot-header__desc">Trực tuyến</span>
                </div>
              </div>
              <div class="chatbot-state-switcher" style="display:flex;align-items:center;gap:12px;">
                <select class="js-chatbot-state-select" aria-label="Chọn trạng thái">
                  <option value="guest">Guest Mode</option>
                  <option value="user">User Mode</option>
                </select>
                <button class="js-menu-chatbot-trigger js-open-sidebar" type="button" aria-label="Lịch sử trò chuyện" style="background:transparent;border:none;cursor:pointer;color:#1a1a1a;padding:0;display:flex;">
                  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                  </svg>
                </button>
              </div>
            </div>
            <div class="chatbot-messages"></div>
            <button class="chatbot-scroll-bottom" type="button" aria-label="Cuộn xuống" style="display:none;">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
            </button>
            <div class="chatbot-quick-chips">
              <span class="chatbot-quick-chips__label">Gợi ý nhanh:</span>
              <div class="chatbot-quick-chips__list">
                <button type="button" class="chatbot-chip js-quick-chip">Gợi ý outfit công sở</button>
                <button type="button" class="chatbot-chip js-quick-chip">Tìm váy dự tiệc</button>
                <button type="button" class="chatbot-chip js-quick-chip">Phối đồ với áo blazer</button>
                <button type="button" class="chatbot-chip js-quick-chip">Chọn size phù hợp</button>
              </div>
            </div>
            <form class="chatbot-input-area js-chatbot-form" data-prevent-submit>
              <button class="chatbot-attach-btn" type="button" aria-label="Đính kèm ảnh">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                  <circle cx="8.5" cy="8.5" r="1.5"></circle>
                  <polyline points="21 15 16 10 5 21"></polyline>
                </svg>
              </button>
              <input type="file" id="img-input" accept="image/*" hidden />
              <div class="chatbot-input-wrapper">
                <input class="chatbot-input js-chatbot-input" type="text" placeholder="Nhập tin nhắn..." aria-label="Nội dung chat" />
                <button class="chatbot-send-btn" type="submit" aria-label="Gửi tin nhắn">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:4px;">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                  </svg>
                  Gửi
                </button>
              </div>
            </form>
            <div style="text-align:center;padding:8px 16px 16px;font-size:0.6875rem;color:var(--text-secondary);background:#fff;border-bottom-left-radius:8px;border-bottom-right-radius:8px;">
              AI chỉ mang tính chất tham khảo nên nếu thắc mắc hãy liên hệ trực tiếp cho chúng mình nhé
            </div>
          </div>
        </div>
      </div>
    </main>
    <load src="/src/components/footer.html" />
  </div>
  <load src="/src/components/search-overlay.html" />
  <script type="module" src="/src/scripts/main.js"></script>
</body>
</html>
