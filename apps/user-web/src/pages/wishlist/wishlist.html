<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sản phẩm yêu thích - Velura Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Playfair+Display:wght@500;600&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="../../styles/main.css" />
</head>

<body class="page-wishlist">
  <div class="page-shell">
    <!-- Header -->
    <load src="/src/components/header.html" />

    <!-- Main Content -->
    <main class="wishlist-page">
      <div class="container">
        <!-- Wishlist Header -->
        <div class="wishlist-header">
          <div class="wishlist-header__left">
            <load src="/src/components/breadcrumb.html" />
            <h1 class="wishlist-title">Sản phẩm yêu thích</h1>
            <p class="wishlist-subtitle">Bạn đã lưu 8 sản phẩm</p>
          </div>
          <div class="wishlist-header__right">
            <button class="wishlist-share-btn" type="button">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <circle cx="18" cy="5" r="3" />
                <circle cx="6" cy="12" r="3" />
                <circle cx="18" cy="19" r="3" />
                <line x1="8.59" y1="13.51" x2="15.42" y2="17.49" />
                <line x1="15.41" y1="6.51" x2="8.59" y2="10.49" />
              </svg>
              Chia sẻ danh sách
            </button>
          </div>
        </div>

        <!-- Wishlist Product Grid -->
        <div class="wishlist-grid">
          <!-- wishlist-grid Template -->
          <div class="wishlist-card" data-bind="wishlist.card">
            <div class="wishlist-card__image-wrapper">
              <img class="wishlist-card__image" src="../../assets/images/image-1.png"
                alt="Hình ảnh sản phẩm yêu thích" data-bind="wishlist.image_url" />
              <button class="wishlist-card__heart-btn" type="button" aria-label="Bỏ yêu thích" data-bind="wishlist.remove_btn">
                <svg width="18" height="18" viewBox="0 0 20 20" fill="currentColor">
                  <path d="M10 17.5l-5.83-5.83a4.17 4.17 0 115.83-5.83 4.17 4.17 0 115.83 5.83L10 17.5z" />
                </svg>
              </button>
            </div>
            <div class="wishlist-card__info">
              <h3 class="wishlist-card__name" data-bind="wishlist.name">{{Tên sản phẩm}}</h3>
              <div class="wishlist-card__price-block">
                <span class="wishlist-card__price" data-bind="wishlist.price">{{Giá}}</span>
                <span class="wishlist-card__old-price" data-bind="wishlist.old_price" style="display: none;">{{Giá cũ}}</span>
              </div>
              <button class="wishlist-card__action-btn" type="button" data-bind="wishlist.cart_btn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round">
                  <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z" />
                  <line x1="3" y1="6" x2="21" y2="6" />
                  <path d="M16 10a4 4 0 0 1-8 0" />
                </svg>
                Thêm vào giỏ
              </button>
            </div>
          </div>
          <!-- /wishlist-grid Template -->
        </div>
      </div>
    </main>

    <!-- Footer -->
    <load src="/src/components/footer.html" />
  </div>

  <script type="module" src="../../scripts/main.js"></script>
</body>

</html>
