<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Velura - Đang xác thực</title>
  <link rel="stylesheet" href="../../styles/main.css">
  <link rel="stylesheet" href="../../styles/pages/_auth-external.css">
</head>
<body>
  <main class="velura-auth-page" aria-label="Xác thực Velura">
    <div class="login-page">
      <a class="logo-container" href="/index.html" aria-label="Về trang chủ Velura">
        <img src="../../assets/images/auth/logo_velura.png" alt="Velura" class="logo">
      </a>
      <div class="callback-card" role="status" aria-live="polite">
        <div class="callback-spinner" id="spinner"></div>
        <h2 id="message">Đang xác thực với mạng xã hội...</h2>
        <p id="detail">Hệ thống đang xử lý đăng nhập của bạn.</p>
        <div class="callback-error" id="error" role="alert" hidden></div>
        <a class="callback-back" id="back" href="/src/pages/auth/signin.html" hidden>Quay lại đăng nhập</a>
      </div>
    </div>
  </main>

  <script type="module">
    const SUPABASE_URL = "https://drvkrpoojyncodfytftn.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_6ELMfwBsM3SFAXQz8-jmOQ_kv1kkGh7";
    const SUPABASE_AUTH = SUPABASE_URL + "/auth/v1";
    const API_BASE = (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1") ? "http://localhost:8787" : window.location.origin;
    const PKCE_KEY = "velura-oauth-pkce-code-verifier";
    const REDIRECT_URI = window.location.origin + "/src/pages/auth/auth-callback.html";

    const spinner = document.getElementById("spinner");
    const messageEl = document.getElementById("message");
    const detailEl = document.getElementById("detail");
    const errorEl = document.getElementById("error");
    const backLink = document.getElementById("back");

    function fail(text) {
      spinner.hidden = true;
      messageEl.textContent = "Xác thực thất bại";
      detailEl.textContent = "";
      errorEl.textContent = text;
      errorEl.hidden = false;
      backLink.hidden = false;
    }

    async function exchangeCode(code, codeVerifier) {
      console.log("[auth-callback] Exchanging code for tokens...");
      const resp = await fetch(SUPABASE_AUTH + "/token?grant_type=pkce", {
        method: "POST",
        headers: { "apikey": SUPABASE_ANON_KEY, "content-type": "application/json" },
        body: JSON.stringify({
          auth_code: code,
          code_verifier: codeVerifier,
          redirect_uri: REDIRECT_URI
        })
      });
      const raw = await resp.text();
      let parsed;
      try { parsed = JSON.parse(raw); } catch { parsed = null; }
      console.log("[auth-callback] Token exchange response:", resp.status, parsed ? "OK" : raw);
      if (!resp.ok) {
        const msg = parsed?.msg || parsed?.error_description || parsed?.message || raw || "Unknown";
        throw new Error("Token exchange failed: " + msg);
      }
      if (!parsed?.access_token) throw new Error("Response missing access_token");
      return parsed;
    }

    async function socialLogin(supabaseToken) {
      console.log("[auth-callback] Calling backend social-login...");
      const resp = await fetch(API_BASE + "/api/user/auth/social-login", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Accept": "application/json"
        },
        body: JSON.stringify({ token: supabaseToken })
      });
      const raw = await resp.text();
      let data;
      try { data = JSON.parse(raw); } catch { data = null; }
      console.log("[auth-callback] Backend response:", resp.status, JSON.stringify(data || raw, null, 2));
      if (!resp.ok) {
        const errMsg = data?.error?.message || data?.error?.details?.msg || data?.message || "Backend error (" + resp.status + ")";
        throw new Error(errMsg);
      }
      return data;
    }

    function storeSession(data) {
      localStorage.setItem("velura_token", data.token);
      localStorage.setItem("velura_user", JSON.stringify(data.user));
      localStorage.setItem("userRole", data.user.role || "member");
      localStorage.setItem("user_id", data.user.user_id);
    }

    async function run() {
      const url = new URL(window.location.href);
      const code = url.searchParams.get("code");
      const errorParam = url.searchParams.get("error");

      if (errorParam) {
        fail(url.searchParams.get("error_description") || "Đăng nhập bị hủy hoặc gặp lỗi.");
        return;
      }

      if (!code) {
        fail("Không tìm thấy mã xác thực trong URL.");
        return;
      }

      const codeVerifier = localStorage.getItem(PKCE_KEY);
      if (!codeVerifier) {
        fail("Không tìm thấy PKCE code verifier. Vui lòng quay lại trang đăng nhập và thử lại.");
        return;
      }

      // Clean URL
      window.history.replaceState({}, "", REDIRECT_URI);

      // Step 1: Exchange code for Supabase tokens
      detailEl.textContent = "Đang trao đổi mã xác thực...";
      let tokenData;
      try {
        tokenData = await exchangeCode(code, codeVerifier);
      } catch (err) {
        console.error("[auth-callback] exchangeCode failed:", err);
        fail("Bước 1 - Token exchange thất bại: " + err.message);
        return;
      } finally {
        localStorage.removeItem(PKCE_KEY);
      }

      // Step 2: Send Supabase token to backend for Velura session
      detailEl.textContent = "Đang tạo phiên đăng nhập...";
      try {
        const result = await socialLogin(tokenData.access_token);
        storeSession(result);

        // Migrate guest quiz data if any
        try {
          const quizData = localStorage.getItem("velura_guest_quiz_data");
          if (quizData) {
            const payload = JSON.parse(quizData);
            await fetch(API_BASE + "/api/user/style-quiz/migrate", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + result.token
              },
              body: JSON.stringify(payload)
            });
            localStorage.removeItem("velura_guest_quiz_data");
          }
        } catch { /* non-critical */ }

        messageEl.textContent = "Đăng nhập thành công!";
        detailEl.textContent = "Xin chào, " + (result.user.full_name || "");
        spinner.hidden = true;

        setTimeout(() => {
          window.location.replace("/index.html");
        }, 800);
      } catch (err) {
        console.error("[auth-callback] socialLogin failed:", err);
        fail("Đăng nhập thất bại: " + err.message);
      }
    }

    run();
  </script>
</body>
</html>
