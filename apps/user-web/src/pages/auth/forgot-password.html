<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Velura — Quên mật khẩu</title>
  <meta name="description" content="Khôi phục mật khẩu tài khoản Velura qua số điện thoại hoặc email." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&family=Playfair+Display:wght@500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="../../styles/main.css" />
</head>

<body class="page-signin page-signin--mobile-stack">
  <main class="signin-stage" role="main" aria-label="Quên mật khẩu Velura">
    <div class="auth-bg-gradient" aria-hidden="true"></div>

    <a href="/index.html" class="brand-logo-link" aria-label="Về trang chủ Velura">
      <span class="brand-logo-text">Velura</span>
    </a>

    <form class="login-card" id="js-forgot-form" action="#" method="post" novalidate>
      <header class="login-card__head">
        <h1 class="login-card__title" style="margin-bottom: 8px;">Quên mật khẩu?</h1>
        <p class="login-card__subtitle" style="margin-bottom: 24px;">
          Nhập số điện thoại hoặc email đăng ký để nhận mã OTP khôi phục.
        </p>
      </header>

      <div class="fields">
        <div class="field">
          <label class="field__label" for="identity">Số điện thoại hoặc Email</label>
          <div class="field__control">
            <input class="field__input" type="text" id="identity" name="identity"
              placeholder="Nhập SĐT hoặc email của bạn" required autocomplete="username" />
          </div>
          <div class="field__error" id="error-identity" aria-live="polite"></div>
        </div>
      </div>

      <button class="btn btn--login" type="submit" id="btn-forgot" style="margin-top: 32px;">Gửi mã xác minh</button>

      <p class="signup" style="margin-top: 24px;">
        <a href="/src/pages/auth/signin.html" style="display: inline-flex; align-items: center; gap: 8px;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
          </svg>
          Quay lại đăng nhập
        </a>
      </p>
    </form>
  </main>
  <script type="module" src="../../scripts/main.js"></script>
</body>

</html>
