<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quên mật khẩu - Velura</title>
  <meta name="description" content="Xác minh tài khoản Velura để đặt lại mật khẩu.">
  <link rel="stylesheet" href="../../styles/main.css">
  <link rel="stylesheet" href="../../styles/pages/_auth-external.css">
</head>
<body>
  <main class="velura-auth-page" aria-label="Khôi phục mật khẩu Velura">
    <div class="login-page">
      <a class="logo-container" href="/index.html" aria-label="Về trang chủ Velura">
        <img src="../../assets/images/auth/logo_velura.png" alt="Velura" class="logo">
      </a>

      <img src="../../assets/images/auth/model_main.png" alt="" class="main-model" aria-hidden="true">

      <form class="login-container" id="js-forgot-form" action="#" method="post" novalidate>
        <nav class="back-link" aria-label="Điều hướng xác thực">
          <a href="/src/pages/auth/signin.html">
            <span aria-hidden="true">←</span>
            Quay lại đăng nhập
          </a>
        </nav>

        <header class="header">
          <h1>Quên mật khẩu?</h1>
          <p>Nhập email hoặc số điện thoại để nhận mã xác nhận</p>
        </header>

        <div class="form-group">
          <label for="identity">Email hoặc số điện thoại</label>
          <div class="input-wrapper">
            <input type="text" id="identity" name="identity" placeholder="example@velura.com hoặc 0912 345 678" autocomplete="username" required>
          </div>
          <p class="input-hint">Nhập thông tin đã dùng để đăng ký tài khoản</p>
          <div class="field__error" id="error-identity" aria-live="polite"></div>
        </div>

        <button type="submit" class="btn-login" id="btn-forgot">Gửi mã xác nhận</button>
      </form>
    </div>
  </main>
  <script type="module" src="../../scripts/main.js"></script>
</body>
</html>
