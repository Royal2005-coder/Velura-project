<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập - Velura</title>
  <meta name="description" content="Đăng nhập tài khoản Velura để tiếp tục mua sắm.">
  <link rel="stylesheet" href="../../styles/main.css">
  <link rel="stylesheet" href="../../styles/pages/_auth-external.css">
</head>
<body>
  <main class="velura-auth-page" aria-label="Đăng nhập Velura">
    <div class="login-page">
      <a class="logo-container" href="/index.html" aria-label="Về trang chủ Velura">
        <img src="../../assets/images/auth/logo_velura.png" alt="Velura" class="logo">
      </a>

      <img src="../../assets/images/auth/model_main.png" alt="" class="main-model" aria-hidden="true">

      <form class="login-container" id="js-signin-form" action="#" method="post" novalidate>
        <header class="header">
          <h1>Chào mừng bạn trở lại<br>với Velura</h1>
          <p>Đăng nhập để tiếp tục mua sắm</p>
        </header>

        <div class="tabs" role="tablist" aria-label="Phương thức đăng nhập">
          <button type="button" class="tab-btn tab" role="tab" aria-selected="false" id="tab-email">Email</button>
          <button type="button" class="tab-btn tab tab--active" role="tab" aria-selected="true" id="tab-phone">Số điện thoại</button>
        </div>

        <section class="tab-panel" role="tabpanel" id="panel-email" aria-labelledby="tab-email">
          <div class="form-group">
            <label for="email-login">Email</label>
            <div class="input-wrapper">
              <input type="email" id="email-login" name="email" placeholder="example@velura.com" autocomplete="email">
            </div>
            <div class="field__error" id="error-email-login" aria-live="polite"></div>
          </div>

          <div class="form-group">
            <label for="password-email">Mật khẩu</label>
            <div class="input-wrapper">
              <input type="password" id="password-email" name="password" placeholder="Nhập mật khẩu" autocomplete="current-password">
              <button class="toggle-password" type="button" aria-label="Hiển thị mật khẩu" data-toggle="password-email">
                <span aria-hidden="true">◉</span>
              </button>
            </div>
            <div class="field__error" id="error-password-email" aria-live="polite"></div>
          </div>
        </section>

        <section class="tab-panel is-active" role="tabpanel" id="panel-phone" aria-labelledby="tab-phone">
          <div class="form-group">
            <label for="phone">Số điện thoại</label>
            <div class="input-wrapper">
              <input type="tel" id="phone" name="phone" placeholder="0912 345 678" autocomplete="tel" inputmode="numeric">
            </div>
            <div class="field__error" id="error-phone" aria-live="polite"></div>
          </div>

          <div class="form-group">
            <label for="password">Mật khẩu</label>
            <div class="input-wrapper">
              <input type="password" id="password" name="password" placeholder="Nhập mật khẩu" autocomplete="current-password">
              <button class="toggle-password" type="button" aria-label="Hiển thị mật khẩu" data-toggle="password">
                <span aria-hidden="true">◉</span>
              </button>
            </div>
            <div class="field__error" id="error-password" aria-live="polite"></div>
          </div>
        </section>

        <div class="form-options">
          <label class="remember-me">
            <input type="checkbox" name="remember" id="remember-me">
            <span>Ghi nhớ đăng nhập</span>
          </label>
          <a href="/src/pages/auth/forgot-password.html" class="forgot-password">Quên mật khẩu?</a>
        </div>

        <div class="lock-notice" id="lock-countdown" hidden aria-live="assertive">
          <span>Tài khoản tạm khóa. Thử lại sau <strong id="lock-timer">15:00</strong></span>
        </div>

        <button type="submit" class="btn-login" id="btn-signin">Đăng nhập</button>

        <div class="social-login">
          <a class="btn-social btn-guest" href="/index.html">Tiếp tục với Guest</a>
        </div>

        <p class="footer signup">Chưa có tài khoản? <a href="/src/pages/auth/signup.html">Đăng ký ngay</a></p>
      </form>
    </div>
  </main>
  <script type="module" src="../../scripts/main.js"></script>
</body>
</html>
