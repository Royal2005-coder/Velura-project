<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập - Velura</title>
  <!-- Auth CSS: ĐÃ CÔ LẬP với tiền tố .velura-auth-page, không ảnh hưởng toàn cục -->
  <link rel="stylesheet" href="/src/styles/pages/_auth-external.css">
</head>
<body>

  <!-- Khung bọc cô lập — MỌI style trong _auth-external.css đều chỉ áp dụng bên trong div này -->
  <div class="velura-auth-page">
    <div class="login-page">

      <!-- Logo -->
      <div class="logo-container">
        <img src="/src/assets/images/auth/logo_velura.png" alt="Velura Logo" class="logo">
      </div>

      <!-- Main Model -->
      <img src="/src/assets/images/auth/model_main.png" alt="" class="main-model">

      <!-- Form đăng nhập -->
      <div class="login-container">
        <div class="header">
          <h1>Chào mừng bạn trở lại<br>với Velura</h1>
          <p>Đăng nhập để tiếp tục mua sắm</p>
        </div>

        <div class="tabs">
          <button class="tab-btn" onclick="switchTab('email')">Email</button>
          <button class="tab-btn active" onclick="switchTab('phone')">Số điện thoại</button>
        </div>

        <form id="loginForm">
          <div class="form-group" id="phoneGroup">
            <label for="phone">Số điện thoại</label>
            <div class="input-wrapper">
              <input type="text" id="phone" name="phone" placeholder="000 111 222 333" autocomplete="tel" inputmode="numeric">
            </div>
          </div>

          <div class="form-group" id="emailGroup" style="display: none;">
            <label for="email">Email</label>
            <div class="input-wrapper">
              <input type="email" id="email" name="email" placeholder="example@velura.com" autocomplete="email">
            </div>
          </div>

          <div class="form-group">
            <label for="password">Mật khẩu</label>
            <div class="input-wrapper">
              <input type="password" id="password" name="password" placeholder="Nhập mật khẩu" autocomplete="current-password">
              <span class="toggle-password" onclick="togglePassword()">
                <svg width="18" height="18" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M1.37466 7.768C1.3191 7.91767 1.3191 8.08232 1.37466 8.232C1.9158 9.54409 2.83434 10.666 4.01384 11.4554C5.19335 12.2448 6.58069 12.6663 8 12.6663C9.4193 12.6663 10.8066 12.2448 11.9861 11.4554C13.1657 10.666 14.0842 9.54409 14.6253 8.232C14.6809 8.08232 14.6809 7.91767 14.6253 7.768C14.0842 6.4559 13.1657 5.33402 11.9861 4.5446C10.8066 3.75517 9.4193 3.33374 8 3.33374C6.58069 3.33374 5.19335 3.75517 4.01384 4.5446C2.83434 5.33402 1.9158 6.4559 1.37466 7.768Z" stroke="#6B635D" stroke-width="1.33333" stroke-linecap="round" stroke-linejoin="round"/>
                  <path d="M8 10C9.10457 10 10 9.10457 10 8C10 6.89543 9.10457 6 8 6C6.89543 6 6 6.89543 6 8C6 9.10457 6.89543 10 8 10Z" stroke="#6B635D" stroke-width="1.33333" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </span>
            </div>
          </div>

          <div class="form-options">
            <label class="remember-me">
              <input type="checkbox"> Ghi nhớ đăng nhập
            </label>
            <!-- Đường dẫn nội bộ đã chuẩn hóa sang kebab-case -->
            <a href="/src/pages/auth/forgot-password-external.html" class="forgot-password">Quên mật khẩu?</a>
          </div>

          <button type="submit" class="btn-login">Đăng nhập</button>
        </form>

        <div class="social-login">
          <button class="btn-social btn-facebook">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M18 2H15C13.6739 2 12.4021 2.52678 11.4645 3.46447C10.5268 4.40215 10 5.67392 10 7V10H7V14H10V22H14V14H17L18 10H14V7C14 6.73478 14.1054 6.48043 14.2929 6.29289C14.4804 6.10536 14.7348 6 15 6H18V2Z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Facebook
          </button>
          <button class="btn-social btn-guest">Tiếp tục với Guest</button>
        </div>

        <div class="footer">
          Chưa có tài khoản? <a href="/src/pages/auth/register-external.html">Đăng ký ngay</a>
        </div>
      </div>

    </div>
  </div><!-- /velura-auth-page -->

  <!-- JS cô lập trong DOMContentLoaded — không rò rỉ biến ra global scope -->
  <script src="/src/scripts/modules/auth-external.js"></script>
</body>
</html>
