<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng ký tài khoản - Velura</title>
  <meta name="description" content="Tạo tài khoản Velura để nhận ưu đãi và mua sắm thuận tiện hơn.">
  <link rel="stylesheet" href="../../styles/main.css">
  <link rel="stylesheet" href="../../styles/pages/_auth-external.css">
</head>
<body>
  <main class="velura-auth-page" aria-label="Đăng ký tài khoản Velura">
    <div class="login-page">
      <a class="logo-container" href="/index.html" aria-label="Về trang chủ Velura">
        <img src="../../assets/images/auth/logo_velura.png" alt="Velura" class="logo">
      </a>

      <img src="../../assets/images/auth/model_main.png" alt="" class="main-model" aria-hidden="true">

      <form class="login-container login-container--register" id="js-signup-form" action="#" method="post" novalidate>
        <header class="header">
          <h1>Tạo tài khoản<br>mới với Velura</h1>
          <p>Đăng ký để trải nghiệm đầy đủ</p>
        </header>

        <div class="form-group">
          <label for="fullname">Họ và tên <span class="field__required">*</span></label>
          <div class="input-wrapper">
            <input type="text" id="fullname" name="fullname" placeholder="Nguyễn Văn A" autocomplete="name" required>
          </div>
          <div class="field__error" id="error-fullname" aria-live="polite"></div>
        </div>

        <div class="form-group">
          <label for="phone-signup">Số điện thoại <span class="field__required">*</span></label>
          <div class="input-wrapper">
            <input type="tel" id="phone-signup" name="phone" placeholder="0912 345 678" autocomplete="tel" inputmode="numeric" required>
            <span class="field__check-icon" id="phone-check-icon" hidden aria-hidden="true"></span>
          </div>
          <div class="field__error" id="error-phone-signup" aria-live="polite"></div>
        </div>

        <div class="form-group">
          <label for="email-signup">Email <span class="field__optional">(không bắt buộc)</span></label>
          <div class="input-wrapper">
            <input type="email" id="email-signup" name="email" placeholder="example@velura.com" autocomplete="email">
            <span class="field__check-icon" id="email-check-icon" hidden aria-hidden="true"></span>
          </div>
          <div class="field__error" id="error-email-signup" aria-live="polite"></div>
        </div>

        <div class="form-group">
          <label for="password-signup">Mật khẩu <span class="field__required">*</span></label>
          <div class="input-wrapper">
            <input type="password" id="password-signup" name="password" placeholder="Nhập mật khẩu" autocomplete="new-password" required>
            <button class="toggle-password" type="button" aria-label="Hiển thị mật khẩu" data-toggle="password-signup">
              <span aria-hidden="true">◉</span>
            </button>
          </div>
          <p class="input-hint">Ít nhất 8 ký tự, gồm chữ hoa, chữ thường và số hoặc ký tự đặc biệt</p>
          <div class="password-strength" id="password-strength" hidden>
            <div class="password-strength__bar"><div class="password-strength__fill" id="strength-fill"></div></div>
            <span class="password-strength__label" id="strength-label"></span>
          </div>
          <div class="field__error" id="error-password-signup" aria-live="polite"></div>
        </div>

        <div class="form-group">
          <label for="password-confirm">Xác nhận mật khẩu <span class="field__required">*</span></label>
          <div class="input-wrapper">
            <input type="password" id="password-confirm" name="password_confirm" placeholder="Nhập lại mật khẩu" autocomplete="new-password" required>
            <button class="toggle-password" type="button" aria-label="Hiển thị mật khẩu" data-toggle="password-confirm">
              <span aria-hidden="true">◉</span>
            </button>
          </div>
          <div class="field__error" id="error-confirm" aria-live="polite"></div>
        </div>

        <button type="submit" class="btn-login" id="btn-signup">Đăng ký</button>
        <p class="footer">Đã có tài khoản? <a href="/src/pages/auth/signin.html">Đăng nhập</a></p>
      </form>
    </div>
  </main>
  <script type="module" src="../../scripts/main.js"></script>
</body>
</html>
