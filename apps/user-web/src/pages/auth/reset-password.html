<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Velura — Đặt lại mật khẩu</title>
  <meta name="description" content="Tạo mật khẩu mới cho tài khoản Velura của bạn." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&family=Playfair+Display:wght@500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="../../styles/main.css" />
</head>

<body class="page-signin page-signin--mobile-stack">
  <main class="signin-stage" role="main" aria-label="Đặt lại mật khẩu Velura">
    <div class="auth-bg-gradient" aria-hidden="true"></div>

    <a href="/index.html" class="brand-logo-link" aria-label="Về trang chủ Velura">
      <span class="brand-logo-text">Velura</span>
    </a>

    <form class="login-card" id="js-reset-form" action="#" method="post" novalidate>
      <header class="login-card__head">
        <h1 class="login-card__title" style="margin-bottom: 8px;">Đặt lại mật khẩu</h1>
        <p class="login-card__subtitle" style="margin-bottom: 24px;">
          Tạo mật khẩu mới an toàn cho tài khoản của bạn.<br />
          Tối thiểu 8 ký tự, gồm chữ hoa, chữ thường và số/ký tự đặc biệt.
        </p>
      </header>

      <div class="fields">
        <!-- Mật khẩu mới -->
        <div class="field field--password">
          <label class="field__label" for="password-new">Mật khẩu mới <span class="field__required">*</span></label>
          <div class="field__control">
            <input class="field__input" type="password" id="password-new" name="password_new"
              placeholder="Nhập mật khẩu mới" autocomplete="new-password" required />
            <button class="field__toggle" type="button" aria-label="Hiển thị mật khẩu" data-toggle="password-new">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                <path d="M1.37 7.77C2.84 5.33 5.19 3.33 8 3.33s5.16 2 6.63 4.44M8 10a2 2 0 100-4 2 2 0 000 4z"
                  stroke="#6B635D" stroke-width="1.33" stroke-linecap="round" />
              </svg>
            </button>
          </div>
          <!-- Password strength indicator -->
          <div class="password-strength" id="reset-password-strength" hidden>
            <div class="password-strength__bar">
              <div class="password-strength__fill" id="reset-strength-fill"></div>
            </div>
            <span class="password-strength__label" id="reset-strength-label"></span>
          </div>
          <div class="field__error" id="error-password-new" aria-live="polite"></div>
        </div>

        <!-- Xác nhận mật khẩu -->
        <div class="field field--password" style="margin-top: 16px;">
          <label class="field__label" for="password-confirm-reset">Xác nhận mật khẩu <span class="field__required">*</span></label>
          <div class="field__control">
            <input class="field__input" type="password" id="password-confirm-reset" name="password_confirm"
              placeholder="Xác nhận mật khẩu mới" autocomplete="new-password" required />
            <button class="field__toggle" type="button" aria-label="Hiển thị mật khẩu" data-toggle="password-confirm-reset">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                <path d="M1.37 7.77C2.84 5.33 5.19 3.33 8 3.33s5.16 2 6.63 4.44M8 10a2 2 0 100-4 2 2 0 000 4z"
                  stroke="#6B635D" stroke-width="1.33" stroke-linecap="round" />
              </svg>
            </button>
          </div>
          <div class="field__error" id="error-confirm-reset" aria-live="polite"></div>
        </div>
      </div>

      <button class="btn btn--login" type="submit" id="btn-reset" style="margin-top: 32px;">Đặt lại mật khẩu</button>

      <p class="signup" style="margin-top: 24px;">
        <a href="/src/pages/auth/signin.html" style="display: inline-flex; align-items: center; gap: 8px;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
          </svg>
          Quay lại đăng nhập
        </a>
      </p>
    </form>
  </main>
  <script type="module" src="../../scripts/main.js"></script>
</body>

</html>
