<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng ký tài khoản - Velura</title>
  <!-- Auth CSS: ĐÃ CÔ LẬP với tiền tố .velura-auth-page, không ảnh hưởng toàn cục -->
  <link rel="stylesheet" href="/src/styles/pages/_auth-external.css">
</head>
<body>

  <!-- Khung bọc cô lập — MỌI style trong _auth-external.css đều chỉ áp dụng bên trong div này -->
  <div class="velura-auth-page">
    <div class="login-page">

      <!-- Logo -->
      <div class="logo-container">
        <img src="/src/assets/images/auth/logo_velura.png" alt="Velura Logo" class="logo">
      </div>

      <!-- Main Model -->
      <img src="/src/assets/images/auth/model_main.png" alt="" class="main-model">

      <!-- Form đăng ký -->
      <div class="login-container">
        <div class="header">
          <h1>Tạo tài khoản<br>mới với Velura</h1>
          <p>Đăng ký để trải nghiệm đầy đủ</p>
        </div>

        <div class="tabs">
          <button class="tab-btn active" onclick="switchRegTab('email')">Email</button>
          <button class="tab-btn" onclick="switchRegTab('phone')">Số điện thoại</button>
        </div>

        <form id="registerForm">
          <div class="form-group">
            <label for="reg-name">Họ và tên</label>
            <div class="input-wrapper">
              <input type="text" id="reg-name" name="fullname" placeholder="Nguyễn Văn A" autocomplete="name">
            </div>
          </div>

          <div class="form-group" id="regEmailGroup">
            <label for="reg-email">Email</label>
            <div class="input-wrapper">
              <input type="email" id="reg-email" name="email" placeholder="example@velura.com" autocomplete="email">
            </div>
          </div>

          <div class="form-group" id="regPhoneGroup" style="display: none;">
            <label for="reg-phone">Số điện thoại</label>
            <div class="input-wrapper">
              <input type="text" id="reg-phone" name="phone" placeholder="000 111 222 333" autocomplete="tel" inputmode="numeric">
            </div>
          </div>

          <div class="form-group">
            <label for="reg-password">Mật khẩu</label>
            <div class="input-wrapper">
              <input type="password" id="reg-password" name="password" placeholder="Nhập mật khẩu" autocomplete="new-password">
              <span class="toggle-password" onclick="toggleRegPassword()">
                <svg width="18" height="18" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M1.37466 7.768C1.3191 7.91767 1.3191 8.08232 1.37466 8.232C1.9158 9.54409 2.83434 10.666 4.01384 11.4554C5.19335 12.2448 6.58069 12.6663 8 12.6663C9.4193 12.6663 10.8066 12.2448 11.9861 11.4554C13.1657 10.666 14.0842 9.54409 14.6253 8.232C14.6809 8.08232 14.6809 7.91767 14.6253 7.768C14.0842 6.4559 13.1657 5.33402 11.9861 4.5446C10.8066 3.75517 9.4193 3.33374 8 3.33374C6.58069 3.33374 5.19335 3.75517 4.01384 4.5446C2.83434 5.33402 1.9158 6.4559 1.37466 7.768Z" stroke="#6B635D" stroke-width="1.33333" stroke-linecap="round" stroke-linejoin="round"/>
                  <path d="M8 10C9.10457 10 10 9.10457 10 8C10 6.89543 9.10457 6 8 6C6.89543 6 6 6.89543 6 8C6 9.10457 6.89543 10 8 10Z" stroke="#6B635D" stroke-width="1.33333" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </span>
            </div>
            <p class="input-hint">Ít nhất 8 ký tự, có chữ hoa và số</p>
          </div>

          <div class="form-group">
            <label for="reg-confirm-password">Xác nhận mật khẩu</label>
            <div class="input-wrapper">
              <input type="password" id="reg-confirm-password" name="password_confirm" placeholder="Nhập lại mật khẩu" autocomplete="new-password">
              <span class="toggle-password" onclick="toggleRegConfirmPassword()">
                <svg width="18" height="18" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M1.37466 7.768C1.3191 7.91767 1.3191 8.08232 1.37466 8.232C1.9158 9.54409 2.83434 10.666 4.01384 11.4554C5.19335 12.2448 6.58069 12.6663 8 12.6663C9.4193 12.6663 10.8066 12.2448 11.9861 11.4554C13.1657 10.666 14.0842 9.54409 14.6253 8.232C14.6809 8.08232 14.6809 7.91767 14.6253 7.768C14.0842 6.4559 13.1657 5.33402 11.9861 4.5446C10.8066 3.75517 9.4193 3.33374 8 3.33374C6.58069 3.33374 5.19335 3.75517 4.01384 4.5446C2.83434 5.33402 1.9158 6.4559 1.37466 7.768Z" stroke="#6B635D" stroke-width="1.33333" stroke-linecap="round" stroke-linejoin="round"/>
                  <path d="M8 10C9.10457 10 10 9.10457 10 8C10 6.89543 9.10457 6 8 6C6.89543 6 6 6.89543 6 8C6 9.10457 6.89543 10 8 10Z" stroke="#6B635D" stroke-width="1.33333" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </span>
            </div>
          </div>

          <div class="form-options">
            <label class="remember-me">
              <input type="checkbox"> Tôi đồng ý với <a href="#" class="forgot-password">Chính sách &amp; Điều khoản</a>
            </label>
          </div>

          <button type="submit" class="btn-login">Đăng ký</button>
        </form>

        <div class="footer">
          Đã có tài khoản? <a href="/src/pages/auth/login-external.html">Đăng nhập</a>
        </div>
      </div>

    </div>
  </div><!-- /velura-auth-page -->

  <!-- JS cô lập trong DOMContentLoaded — không rò rỉ biến ra global scope -->
  <script src="/src/scripts/modules/auth-external.js"></script>
</body>
</html>
