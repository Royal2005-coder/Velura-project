<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ưu đãi tháng này — Velura</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Playfair+Display:wght@500;600&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="/src/styles/main.css" />
</head>

<body>
  <div class="page-shell">
    <load src="/src/components/header.html" />

    <main class="offers-page">
      <section class="offers-hero container">
        <p class="offers-hero__eyebrow">Velura Hot Deals</p>
        <h1 class="offers-hero__title">Ưu đãi tháng này</h1>
        <p class="offers-hero__desc">
          Những món quà nhỏ, mã freeship và combo phối đồ được Velura tuyển chọn để bạn mua sắm nhẹ nhàng hơn.
        </p>
      </section>

      <section class="offer-list-section container" aria-labelledby="offer-list-title">
        <div class="offer-list-section__header">
          <span class="hot-banner-section__eyebrow">Hot deals</span>
          <h2 class="hot-banner-section__title" id="offer-list-title">Bộ sưu tập ưu đãi</h2>
        </div>

        <div class="offer-banner-list js-offer-banner-list" aria-label="Danh sách ưu đãi Velura"></div>
      </section>
    </main>

    <load src="/src/components/footer.html" />
  </div>

  <script type="module" src="/src/scripts/main.js"></script>
</body>

</html>
