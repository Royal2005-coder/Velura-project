<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Velura — Đăng nhập</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../styles/auth.css" />
</head>
<body class="page-auth">
  <main class="auth-card" role="main" aria-label="Đăng nhập Velura">
    <div class="auth-card__brand">
      <img src="../../assets/images/logo.png" alt="Velura" />
      <h1>Chào mừng trở lại</h1>
      <p>Đăng nhập để tiếp tục mua sắm</p>
    </div>

    <div class="auth-error" id="login-error" role="alert"></div>
    <div class="auth-success" id="login-success"></div>

    <div class="google-btn-wrap" id="google-btn-container">
      <button class="auth-btn auth-btn--google" type="button" id="btn-google-login">
        <svg viewBox="0 0 24 24" width="20" height="20"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Đăng nhập bằng Google
      </button>
    </div>
    <p class="auth-google-note">Đăng nhập an toàn qua Supabase Auth</p>

    <div class="auth-divider">hoặc</div>

    <form id="login-form" novalidate>
      <div class="auth-field">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" placeholder="email@example.com" required autocomplete="email" />
      </div>
      <div class="auth-field">
        <label for="login-password">Mật khẩu</label>
        <input type="password" id="login-password" placeholder="Nhập mật khẩu" required autocomplete="current-password" />
      </div>
      <button class="auth-btn auth-btn--primary auth-btn--spaced" type="submit">Đăng nhập</button>
    </form>

    <div class="auth-links">
      <a href="#" id="link-forgot">Quên mật khẩu?</a>
    </div>

    <div class="auth-footer">
      Chưa có tài khoản? <a href="./register.html">Đăng ký ngay</a>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.0/dist/umd/supabase.min.js"></script>

  <script type="module">
    import {
      establishAuthoritativeSession,
      firstAllowedPage,
      signOut,
      SUPABASE_URL,
      SUPABASE_ANON_KEY
    } from '../../scripts/supabase-auth.js';

    var PKCE_STORAGE_KEY = 'velura-oauth-pkce-code-verifier';
    var SUPABASE_AUTH = SUPABASE_URL + '/auth/v1';

    var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { flowType: 'pkce', persistSession: true, autoRefreshToken: true, detectSessionInUrl: false, storage: window.localStorage }
    });

    var errorEl = document.getElementById("login-error");
    var successEl = document.getElementById("login-success");

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.classList.add("is-visible");
      successEl.classList.remove("is-visible");
    }

    function hideMessages() {
      errorEl.classList.remove("is-visible");
      successEl.classList.remove("is-visible");
    }

    function showSuccess(msg) {
      successEl.textContent = msg;
      successEl.classList.add("is-visible");
      errorEl.classList.remove("is-visible");
    }

    function redirectUser(session) {
      window.location.href = "./" + firstAllowedPage(session) + ".html";
    }

    async function finishLogin(supabaseSession) {
      var appSession = await establishAuthoritativeSession(supabaseSession);
      if (!appSession.isActive) {
        await signOut();
        throw new Error("Tài khoản đã bị khóa. Vui lòng liên hệ quản trị viên.");
      }
      redirectUser(appSession);
    }

    /* ── Manual PKCE: generate verifier, compute challenge, store ── */
    function generateCodeVerifier() {
      var array = new Uint8Array(32);
      crypto.getRandomValues(array);
      return btoa(String.fromCharCode.apply(null, array)).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }

    async function computeCodeChallenge(verifier) {
      var encoder = new TextEncoder();
      var data = encoder.encode(verifier);
      var digest = await crypto.subtle.digest('SHA-256', data);
      var array = new Uint8Array(digest);
      return btoa(String.fromCharCode.apply(null, array)).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }

    async function startGoogleOAuth() {
      hideMessages();
      var redirectTo = window.location.origin + '/pages/admin/auth-callback.html';
      var verifier = generateCodeVerifier();
      var challenge = await computeCodeChallenge(verifier);
      localStorage.setItem(PKCE_STORAGE_KEY, verifier);
      var url = SUPABASE_AUTH + '/authorize?provider=google'
        + '&code_challenge=' + encodeURIComponent(challenge)
        + '&code_challenge_method=s256'
        + '&redirect_to=' + encodeURIComponent(redirectTo);
      window.location.href = url;
    }

    document.getElementById("btn-google-login").addEventListener("click", async function() {
      hideMessages();
      try {
        await startGoogleOAuth();
      } catch (err) {
        showError("Không thể kết nối Google SSO. Vui lòng thử lại hoặc đăng nhập bằng email.");
      }
    });

    document.getElementById("login-form").addEventListener("submit", async function(e) {
      e.preventDefault();
      hideMessages();
      var email = document.getElementById("login-email").value.trim();
      var password = document.getElementById("login-password").value;
      if (!email || !password) { showError("Vui lòng nhập đầy đủ email và mật khẩu."); return; }
      try {
        var result = await sb.auth.signInWithPassword({ email: email, password: password });
        if (result.error) {
          showError("Email hoặc mật khẩu không hợp lệ.");
          return;
        }
        try {
          await finishLogin(result.data.session);
        } catch (error) {
          showError(error.message || "Đăng nhập thành công nhưng không thể xác minh quyền quản trị.");
        }
      } catch {
        showError("Email hoặc mật khẩu không hợp lệ.");
      }
    });

    document.getElementById("link-forgot").addEventListener("click", async function(e) {
      e.preventDefault();
      hideMessages();
      var email = document.getElementById("login-email").value.trim();
      if (!email) { showError("Nhập email để nhận liên kết đặt lại mật khẩu."); return; }
      try {
        await sb.auth.resetPasswordForEmail(email, {
          redirectTo: window.location.origin + "/pages/admin/change-password.html"
        });
        showSuccess("Nếu email tồn tại, liên kết đặt lại mật khẩu đã được gửi.");
      } catch {
        showSuccess("Nếu email tồn tại, liên kết đặt lại mật khẩu đã được gửi.");
      }
    });

    (async function() {
      try {
        var { data: { session } } = await sb.auth.getSession();
        if (session?.access_token) await finishLogin(session);
      } catch {
        await signOut();
      }
    })();
  </script>
</body>
</html>
